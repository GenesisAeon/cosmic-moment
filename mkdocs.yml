site_name: cosmic-moment
site_description: Discrete moments of cosmic emergence — singular points where modulated entropy duality collapses into conscious frames.
site_author: GenesisAeon
repo_url: https://github.com/GenesisAeon/cosmic-moment
repo_name: GenesisAeon/cosmic-moment

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets

nav:
  - Home: index.md
  - CLI Reference: cli.md
  - Changelog: changelog.md
